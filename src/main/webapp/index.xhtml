<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      lang="ru">

<h:head>
    <meta charset="UTF-8" />
    <title>Лабораторная работа №2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- /context/javax.faces.resource/style.css?ln=css -->
    <h:outputStylesheet library="css" name="style.css" />
    <style type="text/css">
        @font-face {
            font-family: "Advaken Sans";
            src: url("#{resource['fonts:AdvakenSans.otf']}") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: "Random Grotesque";
            src: url("#{resource['fonts:RG-SpaciousBook.ttf']}") format("opentype");
            font-weight: normal;
            font-style: normal;
        }
    </style>
    <h:outputScript library="js" name="main.js" target="body" />
</h:head>

<h:body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="header__title">Лабораторная работа 2</h1>
            <p class="header__meta">
                <span><strong>ФИО:</strong> Соловьев Даниил Дмитриевич</span>
                <span><strong>Группа:</strong> Р3222</span>
                <span><strong>ИСУ:</strong> 467550</span>
            </p>
        </header>

        <!-- Main -->
        <main class="grid">
            <!-- Graph -->
            <section class="card">
                <h2 class="card__title">График</h2>
                <div>
                    <canvas id="graph" width="600" height="600"></canvas>
                </div>
            </section>

            <!-- Parameters -->
            <section class="card">
                <h2 class="card__title">Параметры</h2>

                <h:form id="pointForm" styleClass="form">
                    <!-- X -->
                    <div class="field">
                        <label class="label" for="x-select">Координата X:</label>
                        <h:selectOneMenu id="x-select"
                                         value="#{pointBean.x}"
                                         styleClass="x-row"
                                         aria-label="Выбор X"
                                         required="true">
                            <f:selectItem itemValue="" itemLabel="Выбери X" noSelectionOption="true" />
                            <f:selectItem itemValue="-2"   itemLabel="-2" />
                            <f:selectItem itemValue="-1.5" itemLabel="-1.5" />
                            <f:selectItem itemValue="-1"   itemLabel="-1" />
                            <f:selectItem itemValue="-0.5" itemLabel="-0.5" />
                            <f:selectItem itemValue="0"    itemLabel="0" />
                            <f:selectItem itemValue="0.5"  itemLabel="0.5" />
                            <f:selectItem itemValue="1"    itemLabel="1" />
                            <f:selectItem itemValue="1.5"  itemLabel="1.5" />
                            <f:selectItem itemValue="2"    itemLabel="2" />
                        </h:selectOneMenu>
                    </div>

                    <!-- Y -->
                    <div class="field">
                        <label for="y" class="label">Координата Y:</label>
                        <h:inputText id="y"
                                     value="#{pointBean.y}"
                                     styleClass="input"
                                     maxlength="8"
                                     placeholder="Введите Y от -5 до 5" />
                    </div>

                    <!-- R -->
                    <div class="field">
                        <label class="label">Координата R:</label>
                        <div class="row" role="group" aria-label="Выбор R" id="r-chips">
                            <!-- Вёрстка как в идеальном HTML -->
                            <label class="chip">
                                1
                                <input type="radio" name="r-chip" value="1" />
                            </label>
                            <label class="chip">
                                1.5
                                <input type="radio" name="r-chip" value="1.5" />
                            </label>
                            <label class="chip">
                                2
                                <input type="radio" name="r-chip" value="2" />
                            </label>
                            <label class="chip">
                                2.5
                                <input type="radio" name="r-chip" value="2.5" />
                            </label>
                            <label class="chip">
                                3
                                <input type="radio" name="r-chip" value="3" />
                            </label>
                        </div>

                        <!-- Сюда JS будет писать выбранный R, чтобы JSF-бин его получил -->
                        <h:inputHidden id="r" value="#{pointBean.r}" />
                    </div>

                    <!-- Action -->
                    <div class="actions">
                        <h:commandButton value="ПРОВЕРИТЬ ТОЧКУ"
                                         styleClass="btn"
                                         action="#{pointBean.submit}" />
                    </div>

                    <!-- Ошибка -->
                    <h:panelGroup rendered="#{not empty pointBean.error}">
                        <div class="kpi miss" style="margin-top:12px">
                            <h:outputText value="#{pointBean.error}" />
                        </div>
                    </h:panelGroup>
                </h:form>
            </section>
        </main>

        <!-- Results -->
        <section class="card" style="margin-top:24px">
            <h2 class="card__title">Результаты</h2>

            <div class="results">
                <table aria-label="История попаданий">
                    <thead>
                    <tr>
                        <th style="text-align:center">Попадания</th>
                        <th style="text-align:center">X</th>
                        <th style="text-align:center">Y</th>
                        <th style="text-align:center">R</th>
                    </tr>
                    </thead>
                    <tbody id="results-body">
                    <!-- Пусто -->
                    <ui:fragment rendered="#{empty pointBean.results}">
                        <tr class="empty-row">
                            <td colspan="4" style="text-align:center;opacity:.7">
                                Пока нет результатов
                            </td>
                        </tr>
                    </ui:fragment>

                    <!-- Есть результаты -->
                    <ui:repeat value="#{pointBean.results}" var="p">
                        <tr class="#{p.result ? 'hit' : 'miss'}">
                            <td><h:outputText value="#{p.resultText}" /></td>
                            <td><h:outputText value="#{p.x}" /></td>
                            <td><h:outputText value="#{p.y}" /></td>
                            <td><h:outputText value="#{p.r}" /></td>
                        </tr>
                    </ui:repeat>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</h:body>
</html>
