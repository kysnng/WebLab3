<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui"
      lang="ru">

<h:head>
    <meta charset="UTF-8" />
    <title>Лабораторная работа №2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <h:outputStylesheet library="css" name="style.css" />
    <style type="text/css">
        @font-face {
            font-family: "Advaken Sans";
            src: url("#{resource['fonts:AdvakenSans.otf']}") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: "Random Grotesque";
            src: url("#{resource['fonts:RG-SpaciousBook.ttf']}") format("opentype");
            font-weight: normal;
            font-style: normal;
        }
    </style>
    <h:outputScript library="js" name="main.js" target="body" />
</h:head>

<h:body>
    <div class="container">
        <header class="header">
            <h1 class="header__title">Лабораторная работа 2</h1>
            <p class="header__meta">
                <span><strong>ФИО:</strong> Соловьев Даниил Дмитриевич</span>
                <span><strong>Группа:</strong> Р3222</span>
                <span><strong>ИСУ:</strong> 467550</span>
            </p>
        </header>
        <div style="margin-top:16px">
            <h:link outcome="/clock" style="color:#F4EDE3;text-decoration:underline">
                Вернуться на главую
            </h:link>
        </div>

        <main class="grid">
            <section class="card">
                <h2 class="card__title">График</h2>
                <div>
                    <canvas id="graph" width="600" height="600"></canvas>
                </div>
            </section>

            <section class="card">
                <h2 class="card__title">Параметры</h2>

                <h:form id="pointForm" styleClass="form" prependId="false">
                    <div class="field">
                        <label for="x" class="label">Координата X:</label>
                        <p:inputText id="x"
                                     value="#{pointBean.x}"
                                     styleClass="input"
                                     maxlength="8"
                                     placeholder="Введите X от -3 до 3"
                                     required="true">
                            <f:validateDoubleRange minimum="-3" maximum="3"/>
                        </p:inputText>
                    </div>

                    <div class="field">
                        <label for="ySlider" class="label">Координата Y:</label>

                        <p:slider id="ySlider" for="y" minValue="-3" maxValue="3" step="0.01"/>

                        <p:inputText id="y"
                                     value="#{pointBean.y}"
                                     style="width:80px;"
                                     required="true">
                            <f:validateDoubleRange minimum="-3" maximum="3"/>
                        </p:inputText>
                    </div>

                    <div class="field">
                        <label class="label">Координата R:</label>
                        <div class="row" style="gap:8px">

                            <p:commandButton value="1"
                                             styleClass="chip"
                                             type="button"
                                             onclick="document.getElementById('rHidden').value='1'; drawGraph(1);" />

                            <p:commandButton value="1.5"
                                             styleClass="chip"
                                             type="button"
                                             onclick="document.getElementById('rHidden').value='1.5'; drawGraph(1.5);" />

                            <p:commandButton value="2"
                                             styleClass="chip"
                                             type="button"
                                             onclick="document.getElementById('rHidden').value='2'; drawGraph(2);" />

                            <p:commandButton value="2.5"
                                             styleClass="chip"
                                             type="button"
                                             onclick="document.getElementById('rHidden').value='2.5'; drawGraph(2.5);" />

                            <p:commandButton value="3"
                                             styleClass="chip"
                                             type="button"
                                             onclick="document.getElementById('rHidden').value='3'; drawGraph(3);" />

                        </div>

                        <h:inputHidden id="rHidden" value="#{pointBean.r}" />
                    </div>


                    <div class="actions">
                        <p:commandButton value="ПРОВЕРИТЬ ТОЧКУ"
                                         styleClass="btn"
                                         action="#{pointBean.submit}"
                                         process="@form"
                                         update="@form results-table"
                        />
                    </div>

                    <h:panelGroup rendered="#{not empty pointBean.error}">
                        <div class="kpi miss" style="margin-top:12px">
                            <h:outputText value="#{pointBean.error}" />
                        </div>
                    </h:panelGroup>
                </h:form>
            </section>
        </main>


        <h:panelGroup id="results-table">
        <section class="card" style="margin-top:24px">
            <h2 class="card__title">Результаты</h2>

            <div class="results">
                <table aria-label="История попаданий">
                    <thead>
                    <tr>
                        <th style="text-align:center">Результат</th>
                        <th style="text-align:center">X</th>
                        <th style="text-align:center">Y</th>
                        <th style="text-align:center">R</th>
                        <th style="text-align:center">Время работы</th>
                        <th style="text-align:center">Время запроса</th>
                    </tr>
                    </thead>
                    <tbody id="results-body">
                    <ui:fragment rendered="#{empty pointBean.results}">
                        <tr class="empty-row">
                            <td colspan="6" style="text-align:center;opacity:.7">
                                Пока нет результатов
                            </td>
                        </tr>
                    </ui:fragment>

                    <ui:repeat value="#{pointBean.results}" var="p">
                        <tr class="#{p.result ? 'hit' : 'miss'}">
                            <td><h:outputText value="#{p.resultText}" /></td>
                            <td><h:outputText value="#{p.x}" /></td>
                            <td><h:outputText value="#{p.y}" /></td>
                            <td><h:outputText value="#{p.r}" /></td>
                            <td>
                                <h:outputText value="#{p.execTimeMs}">
                                    <f:convertNumber maxFractionDigits="3"/>
                                </h:outputText>
                                мс
                            </td>
                            <td>
                                <h:outputText value="#{p.formattedTimestamp}" />
                            </td>
                        </tr>
                    </ui:repeat>
                    </tbody>
                </table>
            </div>
        </section>
        </h:panelGroup>
    </div>
</h:body>
</html>
