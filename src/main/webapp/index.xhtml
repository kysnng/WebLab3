<!DOCTYPE html>
<html lang="ru"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
  <meta charset="utf-8"/>
  <title>Результат — #{pointBean.lastPoint.resultText}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="#{request.contextPath}/static/css/result.css"/>
</h:head>

<h:body>
  <main class="stage">
    <div class="word">
      <!-- Вариант HIT -->
      <h:panelGroup rendered="#{pointBean.lastPoint.result}">
        <!-- H -->
        <div class="circle circle--h">
          <div class="handle handle--top"></div>
          <div class="handle handle--bottom"></div>
        </div>

        <!-- I -->
        <div class="circle circle--i">
          <div class="handle handle--left"></div>
          <div class="handle handle--right"></div>
        </div>

        <!-- T -->
        <div class="circle circle--t">
          <svg class="t-handles" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
            <!-- ЛЕВАЯ -->
            <g class="t-node t-node--left" transform="translate(28.5, 75)">
              <rect class="t-rect t-rect--left" x="-7" y="-7" width="9" height="9" rx="7"/>
            </g>
            <!-- ПРАВАЯ -->
            <g class="t-node t-node--right" transform="translate(77.5, 75)">
              <rect class="t-rect t-rect--right" x="-7" y="-7" width="9" height="9" rx="7"/>
            </g>
          </svg>
        </div>
      </h:panelGroup>

      <!-- Вариант MISS -->
      <h:panelGroup rendered="#{not pointBean.lastPoint.result}">
        <div class="spec-circle--x">
          <svg class="x-handles" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
            <defs>
              <mask id="x-cut" maskUnits="userSpaceOnUse">
                <rect x="0" y="0" width="100" height="100" fill="black"/>
                <rect class="rect-mask--x" x="0" y="0" width="100" height="100" rx="50" fill="white"/>
                <g fill="black">
                  <g class="x-triangle--top" transform="translate(50, 0)">
                    <polygon points="-18,0 0,36 18,0"/>
                  </g>
                  <g class="x-triangle--right" transform="translate(0, 50)">
                    <polygon points="0,-18 0,18 36,0"/>
                  </g>
                  <g class="x-triangle--bottom" transform="translate(50, 100)">
                    <polygon points="-18,0 18,0 0,-36"/>
                  </g>
                  <g class="x-triangle--left" transform="translate(100, 50)">
                    <polygon points="0,-18 0,18 -36,0"/>
                  </g>
                </g>
              </mask>
            </defs>
            <rect width="100" height="100" class="spec-rect--x"/>
          </svg>
        </div>
        <div class="miss-text">MISS</div>
      </h:panelGroup>
    </div>

    <!-- Таблица результатов -->
    <div class="results">
      <table aria-label="Результаты попадания">
        <thead>
        <tr>
          <th style="text-align:center">Результат</th>
          <th style="text-align:center">X</th>
          <th style="text-align:center">Y</th>
          <th style="text-align:center">R</th>
          <th style="text-align:center">Время работы</th>
          <th style="text-align:center">Время запроса</th>
        </tr>
        </thead>
        <tbody>
        <tr class="#{pointBean.lastPoint.result ? 'hit' : 'miss'}">
          <td><h:outputText value="#{pointBean.lastPoint.resultText}" /></td>
          <td><h:outputText value="#{pointBean.lastPoint.x}" /></td>
          <td><h:outputText value="#{pointBean.lastPoint.y}" /></td>
          <td><h:outputText value="#{pointBean.lastPoint.r}" /></td>
          <td>
            <h:outputText value="#{pointBean.lastPoint.execTimeMs}">
              <f:convertNumber maxFractionDigits="3" />
            </h:outputText>
            мс
          </td>
          <td><h:outputText value="#{pointBean.lastPoint.formattedTimestamp}" /></td>
        </tr>
        </tbody>
      </table>

      <div style="margin-top:16px">
        <!-- Пока просто ссылка обратно на index.xhtml -->
        <a href="#{request.contextPath}/index.xhtml"
           style="color:#F4EDE3;text-decoration:underline">Вернуться к форме</a>
      </div>
    </div>
  </main>

  <!-- Запуск анимаций -->
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const stage = document.querySelector(".stage");
      if (#{pointBean.lastPoint.result}) {
        setTimeout(() => stage.classList.add("is-playing"), 300);
      } else {
        stage.classList.remove("is-playing");
        setTimeout(() => stage.classList.add("is-playing"), 300);
        setTimeout(() => stage.classList.add("is-moving"), 2500);
      }
    });
  </script>
</h:body>
</html>
