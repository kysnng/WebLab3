<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:svg="http://www.w3.org/2000/svg"
      lang="ru">

<h:head>
    <meta charset="utf-8"/>
    <title>
        Результат —
        <h:outputText
                value="#{empty pointBean.lastPoint ? '—' : pointBean.lastPoint.resultText}"/>
    </title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <h:outputStylesheet library="css" name="result.css"/>
    <style type="text/css">
        @font-face {
            font-family: "Advaken Sans";
            src: url("#{resource['fonts:AdvakenSans.otf']}") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: "Random Grotesque";
            src: url("#{resource['fonts:RG-SpaciousBook.ttf']}") format("opentype");
            font-weight: normal;
            font-style: normal;
        }
    </style>
</h:head>

<h:body>
    <main class="stage">
        <div class="word">
            <!-- Вариант HIT (рендерим H I T) -->
            <ui:fragment rendered="#{not empty pointBean.lastPoint and pointBean.lastPoint.result}">
                <!-- H -->
                <div class="circle circle--h">
                    <div class="handle handle--top"></div>
                    <div class="handle handle--bottom"></div>
                </div>

                <!-- I -->
                <div class="circle circle--i">
                    <div class="handle handle--left"></div>
                    <div class="handle handle--right"></div>
                </div>

                <!-- T -->
                <div class="circle circle--t">
                    <svg:svg class="t-handles" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
                        <!-- ЛЕВАЯ -->
                        <svg:g class="t-node t-node--left" transform="translate(28.5, 75)">
                            <svg:rect class="t-rect t-rect--left" x="-7" y="-7" width="9" height="9" rx="7"/>
                        </svg:g>
                        <!-- ПРАВАЯ -->
                        <svg:g class="t-node t-node--right" transform="translate(77.5, 75)">
                            <svg:rect class="t-rect t-rect--right" x="-7" y="-7" width="9" height="9" rx="7"/>
                        </svg:g>
                    </svg:svg>
                </div>
            </ui:fragment>

            <!-- Вариант MISS (круг-крест + текст MISS) -->
            <ui:fragment rendered="#{not empty pointBean.lastPoint and not pointBean.lastPoint.result}">
                <div class="spec-circle--x">
                    <svg:svg class="x-handles" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
                        <svg:defs>
                            <svg:mask id="x-cut" maskUnits="userSpaceOnUse">
                                <svg:rect x="0" y="0" width="100" height="100" fill="black"/>
                                <svg:rect class="rect-mask--x" x="0" y="0" width="100" height="100" rx="50" fill="white"/>
                                <svg:g fill="black">
                                    <svg:g class="x-triangle--top" transform="translate(50, 0)">
                                        <svg:polygon points="-18,0 0,36 18,0"/>
                                    </svg:g>
                                    <svg:g class="x-triangle--right" transform="translate(0, 50)">
                                        <svg:polygon points="0,-18 0,18 36,0"/>
                                    </svg:g>
                                    <svg:g class="x-triangle--bottom" transform="translate(50, 100)">
                                        <svg:polygon points="-18,0 18,0 0,-36"/>
                                    </svg:g>
                                    <svg:g class="x-triangle--left" transform="translate(100, 50)">
                                        <svg:polygon points="0,-18 0,18 -36,0"/>
                                    </svg:g>
                                </svg:g>
                            </svg:mask>
                        </svg:defs>
                        <svg:rect width="100" height="100" class="spec-rect--x"/>
                    </svg:svg>
                </div>
                <div class="miss-text">MISS</div>
            </ui:fragment>
        </div>

        <!-- Таблица результатов -->
        <div class="results">
            <h:panelGroup rendered="#{not empty pointBean.lastPoint}">
                <table aria-label="Результаты попадания">
                    <thead>
                    <tr>
                        <th style="text-align:center">Результат</th>
                        <th style="text-align:center">X</th>
                        <th style="text-align:center">Y</th>
                        <th style="text-align:center">R</th>
                        <th style="text-align:center">Время работы</th>
                        <th style="text-align:center">Время запроса</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr class="#{pointBean.lastPoint.result ? 'hit' : 'miss'}">
                        <td><h:outputText value="#{pointBean.lastPoint.resultText}"/></td>
                        <td><h:outputText value="#{pointBean.lastPoint.x}"/></td>
                        <td><h:outputText value="#{pointBean.lastPoint.y}"/></td>
                        <td><h:outputText value="#{pointBean.lastPoint.r}"/></td>
                        <td>
                            <h:outputText value="#{pointBean.lastPoint.execTimeMs}">
                                <f:convertNumber maxFractionDigits="3"/>
                            </h:outputText>
                            мс
                        </td>
                        <td><h:outputText value="#{pointBean.lastPoint.formattedTimestamp}"/></td>
                    </tr>
                    </tbody>
                </table>
            </h:panelGroup>

            <div style="margin-top:16px">
                <h:link outcome="/index" style="color:#F4EDE3;text-decoration:underline">
                    Вернуться к форме
                </h:link>
            </div>
        </div>
    </main>

    <script type="text/javascript">
        window.addEventListener("DOMContentLoaded", function () {
            const stage = document.querySelector(".stage");
            const isHit = "#{empty pointBean.lastPoint ? 'false' : (pointBean.lastPoint.result ? 'true' : 'false')}" === "true";

            if (isHit) {
                setTimeout(function () {
                    stage.classList.add("is-playing");
                }, 300);
            } else {
                stage.classList.remove("is-playing");
                setTimeout(function () {
                    stage.classList.add("is-playing");
                }, 300);
                setTimeout(function () {
                    stage.classList.add("is-moving");
                }, 2500);
            }
        });
    </script>
</h:body>
</html>
